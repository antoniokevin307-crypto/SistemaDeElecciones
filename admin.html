<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Conteo de Votos SV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific Admin Styles */
        body {
            background-color: #F8FAFC;
        }
    </style>
</head>

<body style="display: none;" id="admin-body"> <!-- Hidden until auth is verified -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="3" y1="9" x2="21" y2="9"></line>
                <line x1="9" y1="21" x2="9" y2="9"></line>
            </svg>
            Panel Admin - TSE
        </a>
        <div class="nav-links">
            <span id="user-email" style="font-weight: 500; margin-right: 1rem; color: var(--text-muted);"></span>
            <button id="btn-logout" class="btn"
                style="padding: 0.5rem 1rem; background: transparent; border: 1px solid var(--border-color);">Cerrar
                Sesión</button>
        </div>
    </nav>

    <div class="container">
        <header class="page-header">
            <h1 class="page-title">Ingreso de Actas Electorales</h1>
            <p class="page-subtitle">Sistema de registro oficial de votos por JRV.</p>
        </header>

        <div class="dashboard-grid">
            <div class="card" style="grid-column: span 12; max-width: 800px; margin: 0 auto;">
                <h2 class="card-title">Nueva Acta</h2>

                <div id="admin-alert" class="alert hidden"></div>

                <form id="acta-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label for="centro_votacion" class="form-label">Centro de Votación</label>
                            <input type="text" id="centro_votacion" class="form-control"
                                placeholder="Ej. Centro Escolar General Francisco Morazán" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label for="jrv" class="form-label">Número de JRV</label>
                            <input type="number" id="jrv" class="form-control" placeholder="Ej. 1045" required min="1">
                        </div>
                        <div class="form-group">
                            <label for="departamento" class="form-label">Departamento</label>
                            <select id="departamento" class="form-control" required>
                                <option value="">Seleccione Departamento</option>
                                <option value="Ahuachapán">Ahuachapán</option>
                                <option value="Santa Ana">Santa Ana</option>
                                <option value="Sonsonate">Sonsonate</option>
                                <option value="Chalatenango">Chalatenango</option>
                                <option value="La Libertad">La Libertad</option>
                                <option value="San Salvador">San Salvador</option>
                                <option value="Cuscatlán">Cuscatlán</option>
                                <option value="La Paz">La Paz</option>
                                <option value="Cabañas">Cabañas</option>
                                <option value="San Vicente">San Vicente</option>
                                <option value="Usulután">Usulután</option>
                                <option value="San Miguel">San Miguel</option>
                                <option value="Morazán">Morazán</option>
                                <option value="La Unión">La Unión</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="zona" class="form-label">Zona</label>
                            <select id="zona" class="form-control" required disabled>
                                <option value="">Seleccione Zona</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="municipio" class="form-label">Distrito</label>
                            <select id="municipio" class="form-control" required disabled>
                                <option value="">Seleccione Distrito</option>
                            </select>
                        </div>
                    </div>

                    <h3 class="form-label"
                        style="font-size: 1.125rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">
                        Registro de Votos Válidos</h3>

                    <div class="votos-grid" id="partidos-votos-container">
                        <div style="grid-column: span 2; text-align: center; padding: 2rem; color: var(--text-muted);">
                            Cargando partidos...
                        </div>
                        <!-- Inputs generados dinámicamente -->
                    </div>

                    <div style="margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                        <button type="submit" class="btn btn-primary"
                            style="width: 100%; font-size: 1.125rem; padding: 1rem;">
                            Guardar Acta Electoral
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initAdmin === 'function') {
                initAdmin();
            }
        });
    </script>
</body>

</html>
