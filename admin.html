<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Conteo de Votos SV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific Admin Styles */
        body {
            background-color: #F8FAFC;
        }
    </style>
</head>

<body style="display: none;" id="admin-body"> <!-- Hidden until auth is verified -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="3" y1="9" x2="21" y2="9"></line>
                <line x1="9" y1="21" x2="9" y2="9"></line>
            </svg>
            Panel de Control - TSE
        </a>
        <div class="nav-links">
            <span id="user-email" style="font-weight: 600; color: var(--text-muted); align-self: center;"></span>
            <button id="btn-logout" class="btn btn-primary"
                style="background: white; color: var(--sv-blue); border: 1px solid var(--sv-blue); box-shadow: none;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container">
        <header class="page-header" style="text-align: left;">
            <div
                style="display: inline-block; padding: 0.4rem 0.8rem; background: #DBEAFE; color: #1E40AF; border-radius: 8px; font-size: 0.8rem; font-weight: 700; margin-bottom: 1rem;">
                DIGITADOR AUTORIZADO
            </div>
            <h1 class="page-title" style="margin-left: 0;">Registro de Actas JRV</h1>
            <p class="page-subtitle" style="margin-left: 0;">Ingrese los resultados oficiales del escrutinio por cada
                urna.</p>
        </header>

        <div class="dashboard-grid">
            <div class="card"
                style="grid-column: span 12; max-width: 900px; margin: 0 auto; border-top: 4px solid var(--sv-blue);">
                <div id="admin-alert" class="alert hidden"></div>

                <form id="acta-form">
                    <div
                        style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
                        <input type="hidden" id="admin-secret-key" value="">
                        <!-- Deprecated but kept for safety in script -->
                        <!-- GEOGRAFÍA BLOQUEADA A USULUTÁN NORTE -->
                        <div class="form-group">
                            <label for="departamento" class="form-label">Departamento</label>
                            <select id="departamento" class="form-control" disabled>
                                <option value="Usulután" selected>Usulután</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="zona" class="form-label">Zona Municipal</label>
                            <select id="zona" class="form-control" disabled>
                                <option value="Usulután Norte" selected>Usulután Norte</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="municipio" class="form-label">Distrito</label>
                            <select id="municipio" class="form-control" required>
                                <option value="">Seleccione Distrito</option>
                                <option value="Alegría">Alegría</option>
                                <option value="Berlín">Berlín</option>
                                <option value="El Triunfo">El Triunfo</option>
                                <option value="Estanzuelas">Estanzuelas</option>
                                <option value="Jucuapa">Jucuapa</option>
                                <option value="Mercedes Umaña">Mercedes Umaña</option>
                                <option value="Nueva Granada">Nueva Granada</option>
                                <option value="San Buenaventura">San Buenaventura</option>
                                <option value="Santiago de María">Santiago de María</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="centro_votacion" class="form-label">Centro de Votación</label>
                            <select id="centro_votacion" class="form-control" required disabled>
                                <option value="">Seleccione un Distrito primero</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="jrv" class="form-label">Número de JRV</label>
                            <input type="number" id="jrv" class="form-control" placeholder="Ej. 1" required min="1">
                        </div>
                    </div>

                    <div style="background: #F1F5F9; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem;">
                        <h3 class="card-title" style="margin-bottom: 1rem; color: #475569;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                            Conteo de Votos Válidos
                        </h3>
                        <div class="votos-grid" id="partidos-votos-container">
                            <div
                                style="grid-column: span 2; text-align: center; padding: 2rem; color: var(--text-muted);">
                                Cargando partidos...
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block"
                        style="padding: 1.25rem; font-size: 1.1rem; border-radius: 12px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                        Transmitir Acta al Sistema Central
                    </button>
                </form>
            </div>
        </div>
        <div class="dashboard-grid" style="margin-top: 2rem;">
            <div class="card" style="grid-column: span 12; max-width: 900px; margin: 0 auto;">
                <h2 class="card-title"
                    style="margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        Mis Registros Recientes
                    </div>
                    <span id="txt-total-registros"
                        style="font-size: 0.9rem; font-weight: 500; color: var(--text-muted);">Cargando...</span>
                </h2>

                <div style="overflow-x: auto;">
                    <table class="results-table" style="margin-top: 0;">
                        <thead>
                            <tr>
                                <th>JRV</th>
                                <th>Centro de Votación</th>
                                <th>Ubicación</th>
                                <th>Fecha</th>
                                <th style="text-align: right;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="user-actas-list">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 2rem; color: var(--text-muted);">
                                    Buscando sus registros...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    </form>
    </div>
    </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initAdmin === 'function') {
                initAdmin();
            }
        });
    </script>
</body>

</html>
